<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORISHIROCKS DJZ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .logo {
      max-width: 600px;
      width: 90%;
      height: auto;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.875rem;
      color: #888;
    }

    footer a {
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/logo.jpg" alt="NORISHIROCKS DJZ" class="logo">
  </main>
  <footer>
    <p>Management: <a href="https://tabimachion.com" target="_blank" rel="noopener">旅と街と音楽と株式会社</a></p>
  </footer>
</body>
</html>
